<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Job Pitch - Gemini</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 600px;
            margin: 2rem auto;
            padding: 1rem;
            line-height: 1.6;
        }
        input, button {
            font-size: 1rem;
            padding: 0.5rem;
            width: 100%;
            margin: 0.5rem 0;
            box-sizing: border-box;
        }
        button {
            background-color: #4285f4;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #3367d6;
        }
        #result {
            margin-top: 1rem;
            padding: 1rem;
            border-left: 4px solid #4285f4;
            background-color: #f8f9fa;
            white-space: pre-wrap;
        }
        .error {
            border-left-color: #d32f2f;
            background-color: #ffebee;
        }
        .loading {
            color: #666;
        }
    </style>
</head>
<body>
    <h1>🎯 Find Your Future Job</h1>
    <p>Type your interest (e.g., "artificial intelligence", "gardening", "music production") and let AI suggest a job for you.</p>

    <input type="text" id="interest" placeholder="e.g., photography, coding, cooking..." />
    <button id="submitBtn">Get Job Suggestion</button>

    <div id="result"></div>

    <script>
        const API_KEY = "AIzaSyDxF7uEC84uPDWAMKd4j6PaNyloikcsY_8";

        const submitBtn = document.getElementById('submitBtn');
        const interestInput = document.getElementById('interest');
        const resultDiv = document.getElementById('result');

        submitBtn.addEventListener('click', async () => {
            const interest = interestInput.value.trim();
            if (!interest) {
                showResult("Please enter an interest.", true);
                return;
            }

            submitBtn.disabled = true; // ✅ Prevent duplicate clicks
            showResult("🤔 Thinking...", false, true);

            try {
                const prompt = `The user is interested in "${interest}". Based on this interest, suggest one specific job title, a short description of what they would do, and a brief reason why this job fits their interest. Keep it concise and friendly.`;

                const response = await fetch(
                    `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${API_KEY}`,
                    // ✅ Changed from gemini-1.5-flash to gemini-pro
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [{ text: prompt }]
                            }]
                        })
                    }
                );

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error?.message || 'API request failed');
                }

                const data = await response.json();
                const jobSuggestion = data.candidates[0].content.parts[0].text;
                resultDiv.innerText = jobSuggestion; // ✅ Fixed: innerText instead of innerHTML
                resultDiv.className = '';
            } catch (error) {
                console.error(error);
                showResult(`Error: ${error.message}. Please check your API key and try again.`, true);
            } finally {
                submitBtn.disabled = false; // ✅ Re-enable button after response
            }
        });

        // ✅ Enter key support
        interestInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') submitBtn.click();
        });

        function showResult(text, isError = false, isLoading = false) {
            resultDiv.innerText = text;
            resultDiv.className = isError ? 'error' : '';
            if (isLoading) resultDiv.classList.add('loading');
            else resultDiv.classList.remove('loading');
        }
    </script>
</body>
</html>
